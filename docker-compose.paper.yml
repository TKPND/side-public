services:
  paper-trader:
    build:
      context: .
      dockerfile: Dockerfile.paper
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
    environment:
      - RUST_LOG=info
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
